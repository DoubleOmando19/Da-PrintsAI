<!DOCTYPE html>
<html>

<head>
  <title>Checkout</title>

  <!-- This code is needed for responsive design to work.
      (Responsive design = make the website look good on
      smaller screen sizes like a phone or a tablet). -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Load a font called Roboto from Google Fonts. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Here are the CSS files for this page. -->
  <link rel="stylesheet" href="styles/shared/general.css" />
  <link rel="stylesheet" href="styles/pages/checkout/checkout-header.css" />
  <link rel="stylesheet" href="styles/pages/checkout/checkout.css" />
  <!-- Load Stripe.js before our JavaScript files -->
  <script src="https://js.stripe.com/v3/"></script>
</head>

<body>
  <div class="checkout-header">
    <div class="header-content">
      <div class="checkout-header-left-section">
        <a href="amazon.html">
          <img style="width: 50px; height: 50px; margin-bottom: 5px;" class="amazon-logo" src="images/Roboto7.png"
            title="Roboto7" />
          <img class="amazon-mobile-logo" src="images/Roboto7.png" title="Roboto7" />
        </a>
      </div>

      <div class="checkout-header-middle-section">
        CHECKOUT
      </div>

      <div class="checkout-header-right-section">
        <img style="width: 150px; height: 100px; margin-top: 20px;" src="images/Sarnia.png" />
      </div>
    </div>
  </div>

  <div class="main">

    <div class="page-title">Review your order</div>

    <div class="checkout-grid">
      <div class="order-summary js-order-summary"></div>

      <div class="payment-summary js-payment-summary"></div>
    </div>

    <div>
      <p style="margin-bottom: 20px; text-decoration: underline; margin-top: 20px; font-weight: bold; font-size: 24px;">
        Purchase
        Information:
      </p>
      <div style="margin-top: 5px; width: 500px;">
        <p style="padding: 2px;">* All images are Generative AI.</p>
        <p style="padding: 2px;">* All images are perfect for wallpaper, thumbnails, screensavers, or small frames (4x6
          or 5x7).</p>
        <p>* All images come in PDF format.</p>
        <p>* All images are copyright protected.</p>
      </div>
    </div>
  </div>

  <!-- Initialize Stripe with your publishable key -->
  <script>
    // Store the Stripe instance in a global variable for access in other scripts
    const stripe = Stripe('pk_test_your_publishable_key'); // Replace with your actual publishable key in production
  </script>

  <script type="module" src="scripts/amazon.js"></script>
  <script type="module" src="scripts/checkout.js"></script>
  <script type="module" src="scripts/integration.js"></script>
  <script type="module" src="scripts/stripe.js"></script>



</body>

</html>
